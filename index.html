<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pan Dy | Menu</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFFFFF',
                        secondary: '#F8D7A7',
                        accent: '#7E3847',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-primary text-gray-800 antialiased font-sans overflow-x-hidden flex flex-col min-h-screen w-full">
    <!-- Navigation & Header -->
<header class="sticky top-0 z-50 bg-primary/95 backdrop-blur-md shadow-sm transition-all duration-300 w-full border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
            
            <div class="flex justify-between items-center pt-3 pb-2 gap-3">
                
                <div class="flex-shrink-0 flex items-center cursor-pointer h-10 sm:h-14" onclick="window.scrollTo(0,0)">
                    <img class="h-full w-auto" src="assets/New Project.png" alt="Pan Dy Logo">
                </div>
                
                <div class="flex items-center gap-2 w-full justify-end">
                    <div class="relative w-full max-w-[180px] sm:max-w-xs">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-2 pointer-events-none">
                            <svg class="w-4 h-4 text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                            </svg>
                        </div>
                        <input type="text" id="search-input" class="block w-full p-1.5 pl-8 text-sm text-gray-900 border border-secondary rounded-lg bg-gray-50 focus:ring-accent focus:border-accent outline-none" placeholder="Rechercher..." data-i18n-placeholder="search_placeholder">
                    </div>

                    <select id="lang-switcher" class="bg-transparent border border-secondary text-accent text-sm rounded-lg focus:ring-accent focus:border-accent block p-1.5 cursor-pointer outline-none flex-shrink-0">
                        <option value="fr">FR</option>
                        <option value="en">EN</option>
                        <option value="es">ES</option>
                    </select>
                </div>
            </div>
            
            <div class="w-full relative pb-1">
                <nav id="category-nav" class="flex overflow-x-auto py-2 gap-2 w-full hide-scrollbar items-center" style="-webkit-overflow-scrolling: touch; scroll-behavior: smooth;">
                    </nav>
            </div>
            
        </div>
    </header>
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="no-results" class="hidden text-center py-12">
            <h3 class="text-2xl text-gray-400 font-serif" data-i18n="no_results">Aucun résultat trouvé</h3>
        </div>

        <div id="menu-container" class="space-y-12 w-full max-w-full">
            </div>
    </main>

    <!-- Footer remains unchanged -->
    <footer class="bg-accent text-secondary py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <img src="assets/logo.png" class="h-12 mx-auto mb-4 brightness-0 invert opacity-80" alt="Pan Dy Footer Logo">
            <p data-i18n="footer_contact">Pour toute remarque, contactez-nous sur WhatsApp : [+212 661-844320]</p>
            <p class="mt-2 text-sm opacity-75">&copy; <span id="year"></span> Pan Dy. <span data-i18n="footer_rights">Tous droits réservés.</span></p>
        </div>
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
